<!DOCTYPE html>
<HTML>
<HEAD>
    <META http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <TITLE>Formularz Metoda POST</TITLE>
</HEAD>
<BODY BGCOLOR="white">
<H3 ALIGN="left">Podaj Imie i Nazwisko</H3>
<FORM ACTION="./param" METHOD="post">
    <TABLE border="0" width="360">
        <TR>
            <TD align="left" width="45%">Podaj Imie:</TD>
            <TD><INPUT TYPE="TEXT" NAME="imie"></TD>
        </TR>
        <TR>
            <TD align="left" width="45%">Podaj Nazwisko:</TD>
            <TD><INPUT TYPE="TEXT" NAME="nazwisko"></TD>
        </TR>
        <TR>
            <TD align="left" width="45%">Podaj Wiek:</TD>
            <TD><INPUT TYPE="NUMBER" NAME="wiek" min="0" max="120"></TD>
        </TR>
        <TR>
            <TD align="left" width="45%">Podaj Plec:</TD>
            <TD><INPUT TYPE="TEXT" NAME="plec"></TD>
        </TR>
        <TR>
            <TD align="right" width="45%"><INPUT TYPE="RESET" VALUE="Wyczysc"></TD>
            <TD align="left"><INPUT TYPE="SUBMIT" VALUE="Przeslij"></TD>
        </TR>
    </TABLE>
</FORM>
</BODY>
</HTML>
