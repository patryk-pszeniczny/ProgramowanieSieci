<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN"
        "http://www.w3.org/TR/html4/loose.dtd">
<HTML>
<HEAD>
    <META http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <TITLE>Formularz Metoda GET</TITLE>
</HEAD>
<BODY BGCOLOR="white">
<H3 ALIGN="left">Podaj Imie i Nazwisko</H3>
<FORM ACTION="./param" METHOD="get">
    <TABLE border="0" width="300">
        <TR><TD align="left" width="40%">Podaj Imie:</TD>
            <TD><INPUT TYPE="TEXT" NAME="imie"></TD>
        </TR>
        <TR><TD align="left" width="40%">Podaj Nazwisko:</TD>
            <TD><INPUT TYPE="TEXT" NAME="nazwisko"></TD>
        </TR>
        <TR><TD align="right" width="40%"><INPUT TYPE="RESET" VALUE="Wyczysc"></TD>
            <TD align="left"><INPUT TYPE="SUBMIT" VALUE="Przeslij"></TD>
        </TR>
    </TABLE>
</FORM>
</BODY>
</HTML>
